services:
  db:
    image: postgres:16
    container_name: career_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: career
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - career_postgres_data:/var/lib/postgresql/data

volumes:
  career_postgres_data:
